name: url-shortener-infra

services:
  postgres:
    image: postgres:16-alpine
    container_name: url_shortener_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: shortener
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d shortener"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: url_shortener_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: url_shortener_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # Основной порт для подключения наших микросервисов
      - "15672:15672" # Порт для веб-интерфейса (Management UI)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    
  gateway:
    build:
      context: ../services/gateway
      dockerfile: Dockerfile
    container_name: url_shortener_gateway
    volumes:
      - ../services/gateway:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: url_shortener_nginx
    ports:
      - "8000:80"
    volumes:
      # Nginx тоже должен видеть файлы (особенно папку public), чтобы отдавать статику
      - ../services/gateway:/var/www/html
      # Пробрасываем наш конфиг, заменяя дефолтный конфиг Nginx
      - ../services/gateway/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data: