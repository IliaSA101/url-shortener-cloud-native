server {
    listen 80;
    index index.php index.html;
    server_name localhost;
    
    # 1. Точка входа. Смотрим строго в папку public!
    root /var/www/html/public;

    # 2. Та самая магия, заменяющая .htaccess
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 3. Перенаправление PHP-кода в наш контейнер с Laravel
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        
        # Обрати внимание на слово gateway! Это имя сервиса из docker-compose
        fastcgi_pass gateway:9000; 
        
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}